<!--
  ============================================================
  Sleep Tracker — drop-in card (v2 with profile settings)
  ============================================================
  Features:
    - Settings modal (⚙) for age, sex, height, weight, activity, sleep target
    - Profile persisted to localStorage as 'sleep_profile'
    - Stats: 7-day avg, 30-day avg, sleep debt, on-target streak,
             bedtime spread, age-based recommendation, BMI, nights logged
    - 30-night sparkline against personal target line
    - Status pill that respects the personal target

  HOW TO USE:
  1. Add this config block ANYWHERE before the card mounts.
     Replace the values with your own Supabase project's URL +
     publishable (anon) key (both safe in the browser):

       <script>
         window.SLEEP_TRACKER = {
           supabaseUrl:     'https://YOUR_PROJECT.supabase.co',
           supabaseAnonKey: 'sb_publishable_YOUR_KEY'
         };
       </script>

  2. Paste this entire file's contents where you want the card to appear.

  3. The card mounts on DOMContentLoaded — no manual init call needed.
     Everything is scoped under .sleep-card-root so styles won't leak.
  ============================================================
-->

<section class="sleep-card-root" id="sleepCardRoot">
  <style>
    .sleep-card-root {
      --sc-text:#FAFAFA; --sc-text-2:#B8B6B0; --sc-text-3:#76746E; --sc-text-4:#4D4B47;
      --sc-accent:#B794F4; --sc-accent-2:#7DD3FC;
      --sc-good:#6BE3A4; --sc-warn:#F2C063; --sc-bad:#FF8A8A;
      --sc-radius:16px;
      --sc-font:-apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --sc-mono:ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      display:block; font-family:var(--sc-font); color:var(--sc-text); margin-bottom:14px;
    }
    .sleep-card-root * { box-sizing:border-box; }
    .sc-eyebrow {
      font-size:10.5px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
      color:var(--sc-text-3); margin-bottom:12px;
      display:flex; align-items:center; gap:12px; font-family:var(--sc-mono);
    }
    .sc-eyebrow::before { content:''; width:18px; height:1px; background:var(--sc-text-3); opacity:0.6; }
    .sc-eyebrow-text { display:inline-flex; align-items:center; gap:8px; }
    .sc-eyebrow-text::before { content:'≡'; font-size:14px; color:var(--sc-text-3); opacity:0.5; }
    .sc-eyebrow-spacer { flex:1; height:1px; background:linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }
    .sc-gear-btn {
      background:none; border:0; padding:4px 6px; cursor:pointer;
      color:var(--sc-text-3); font-size:14px; line-height:1;
      -webkit-tap-highlight-color:transparent;
      transition:color 0.15s;
    }
    .sc-gear-btn:hover { color:var(--sc-text); }
    .sc-card {
      background:rgba(255,255,255,0.04); border:1px solid transparent;
      border-radius:var(--sc-radius); padding:18px 20px 16px;
      backdrop-filter:blur(24px) saturate(1.2);
      -webkit-backdrop-filter:blur(24px) saturate(1.2);
      box-shadow:0 1px 0 0 rgba(255,255,255,0.06) inset,
        0 12px 40px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.25);
      position:relative; overflow:hidden;
    }
    .sc-card::before {
      content:''; position:absolute; top:0; left:14px; right:14px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
      pointer-events:none;
    }
    .sc-head { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
    .sc-head-left { min-width:0; }
    .sc-head-label { font-size:11px; color:var(--sc-text-3); text-transform:uppercase; letter-spacing:0.06em; font-weight:500; margin-bottom:2px; }
    .sc-hours { font-size:34px; font-weight:700; letter-spacing:-0.02em; color:var(--sc-text); line-height:1.05; font-variant-numeric:tabular-nums; }
    .sc-hours-unit { font-size:14px; color:var(--sc-text-3); font-weight:500; margin-left:4px; }
    .sc-times { font-size:11px; color:var(--sc-text-3); margin-top:6px; font-family:var(--sc-mono); }
    .sc-times-dot { display:inline-block; margin:0 6px; opacity:0.5; }
    .sc-status-pill {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 11px; border-radius:999px;
      font-size:10.5px; font-weight:700; font-family:var(--sc-mono);
      letter-spacing:0.06em; text-transform:uppercase;
      background:rgba(255,255,255,0.04); color:var(--sc-text-3);
    }
    .sc-status-pill::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; box-shadow:0 0 5px currentColor; }
    .sc-status-pill.good { color:var(--sc-good); background:rgba(107,227,164,0.10); }
    .sc-status-pill.warn { color:var(--sc-warn); background:rgba(242,192,99,0.10); }
    .sc-status-pill.bad  { color:var(--sc-bad);  background:rgba(255,138,138,0.10); }
    .sc-spark-wrap { margin:4px -4px 14px; padding:10px 6px 0; background:rgba(255,255,255,0.025); border-radius:12px; position:relative; }
    .sc-spark-head { display:flex; justify-content:space-between; font-size:9.5px; font-weight:800; letter-spacing:0.16em; text-transform:uppercase; color:var(--sc-text-3); font-family:var(--sc-mono); padding:0 8px; }
    .sc-spark-svg { display:block; width:100%; height:90px; color:var(--sc-accent); overflow:visible; }
    .sc-stats { display:grid; grid-template-columns:repeat(3, 1fr); gap:6px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.05); }
    @media (max-width:540px) { .sc-stats { grid-template-columns:repeat(2, 1fr); } }
    .sc-stat { display:flex; flex-direction:column; gap:2px; padding:4px 6px; }
    .sc-stat-label { font-size:9px; letter-spacing:0.16em; font-weight:800; text-transform:uppercase; color:var(--sc-text-3); font-family:var(--sc-mono); }
    .sc-stat-val { font-size:14px; font-weight:700; color:var(--sc-text); font-variant-numeric:tabular-nums; font-family:var(--sc-mono); }
    .sc-stat-val.good { color:var(--sc-good); } .sc-stat-val.warn { color:var(--sc-warn); } .sc-stat-val.bad { color:var(--sc-bad); }
    .sc-msg { padding:24px 12px; text-align:center; font-size:12.5px; color:var(--sc-text-3); font-style:italic; }
    .sc-msg.bad { color:var(--sc-bad); font-style:normal; }

    /* Settings modal */
    .sc-modal-bg {
      position:fixed; inset:0; z-index:200;
      background:rgba(5,5,6,0.72); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      display:none; align-items:center; justify-content:center;
      padding:max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }
    .sc-modal-bg.show { display:flex; }
    .sc-modal {
      background:#101012; border:1px solid rgba(255,255,255,0.08);
      border-radius:18px; width:100%; max-width:480px;
      max-height:90vh; overflow-y:auto;
      padding:22px 22px 18px;
      font-family:var(--sc-font); color:var(--sc-text);
    }
    .sc-modal-title { font-size:13px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--sc-text-3); margin-bottom:18px; font-family:var(--sc-mono); }
    .sc-form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
    .sc-field { display:flex; flex-direction:column; gap:5px; }
    .sc-field.full { grid-column:1 / -1; }
    .sc-field-label { font-size:9.5px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--sc-text-3); font-family:var(--sc-mono); }
    .sc-input, .sc-select {
      background:rgba(0,0,0,0.28); border:1px solid rgba(255,255,255,0.08);
      border-radius:9px; padding:10px 12px;
      color:var(--sc-text); font-family:var(--sc-mono); font-size:13px;
      outline:none;
    }
    .sc-input:focus, .sc-select:focus { border-color:rgba(183,148,244,0.5); }
    .sc-modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
    .sc-btn {
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:9px 16px;
      color:var(--sc-text); font-family:inherit; font-size:12.5px; font-weight:600;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      transition:background 0.15s;
    }
    .sc-btn:hover { background:rgba(255,255,255,0.1); }
    .sc-btn.primary {
      background:linear-gradient(180deg, rgba(183,148,244,0.4), rgba(125,211,252,0.36));
      border-color:rgba(183,148,244,0.45);
    }
    .sc-btn.primary:hover { background:linear-gradient(180deg, rgba(183,148,244,0.55), rgba(125,211,252,0.5)); }
  </style>
  <div class="sc-eyebrow">
    <span class="sc-eyebrow-text">SLEEP</span>
    <span class="sc-eyebrow-spacer"></span>
    <button class="sc-gear-btn" id="scGearBtn" type="button" aria-label="Sleep settings">⚙</button>
  </div>
  <div class="sc-card" id="scCard">
    <div class="sc-msg" id="scMsg">Loading sleep…</div>
  </div>
  <div class="sc-modal-bg" id="scModalBg">
    <div class="sc-modal" role="dialog" aria-label="Sleep settings">
      <div class="sc-modal-title">Profile · Sleep</div>
      <div class="sc-form-row">
        <label class="sc-field"><span class="sc-field-label">Age</span><input class="sc-input" id="scAge" type="number" min="1" max="120" inputmode="numeric"/></label>
        <label class="sc-field"><span class="sc-field-label">Sex</span><select class="sc-select" id="scSex"><option value="m">Male</option><option value="f">Female</option><option value="x">Other / Prefer not to say</option></select></label>
        <label class="sc-field"><span class="sc-field-label">Height (cm)</span><input class="sc-input" id="scHeight" type="number" min="50" max="260" step="0.1" inputmode="decimal"/></label>
        <label class="sc-field"><span class="sc-field-label">Weight (kg)</span><input class="sc-input" id="scWeight" type="number" min="20" max="300" step="0.1" inputmode="decimal"/></label>
        <label class="sc-field full"><span class="sc-field-label">Activity level</span>
          <select class="sc-select" id="scActivity">
            <option value="sedentary">Sedentary (desk, little exercise)</option>
            <option value="light">Light (1–3 days / week)</option>
            <option value="moderate">Moderate (3–5 days / week)</option>
            <option value="high">High (6–7 days / week)</option>
            <option value="athlete">Athlete (twice a day / pro)</option>
          </select>
        </label>
        <label class="sc-field full"><span class="sc-field-label">Sleep target (hours)</span><input class="sc-input" id="scTarget" type="number" min="4" max="12" step="0.25" inputmode="decimal"/></label>
      </div>
      <div class="sc-modal-actions">
        <button class="sc-btn" id="scCancelBtn" type="button">Cancel</button>
        <button class="sc-btn primary" id="scSaveBtn" type="button">Save</button>
      </div>
    </div>
  </div>
</section>

<script>
(function () {
  const CFG = (typeof window !== 'undefined' && window.SLEEP_TRACKER) || {};
  const SUPABASE_URL = CFG.supabaseUrl || '';
  const SUPABASE_KEY = CFG.supabaseAnonKey || '';
  const PROFILE_KEY = 'sleep_profile';

  function recommendedRange(age) {
    if (age == null) return [7, 9];
    if (age < 1)   return [12, 16];
    if (age < 3)   return [11, 14];
    if (age < 6)   return [10, 13];
    if (age < 13)  return [9, 12];
    if (age < 18)  return [8, 10];
    if (age < 65)  return [7, 9];
    return [7, 8];
  }
  function loadProfile() {
    let p = null;
    try { p = JSON.parse(localStorage.getItem(PROFILE_KEY)); } catch (e) {}
    if (!p || typeof p !== 'object') p = {};
    const age = Number(p.age) || null;
    const rec = recommendedRange(age);
    return {
      age,
      sex: p.sex || 'm',
      heightCm: Number(p.heightCm) || null,
      weightKg: Number(p.weightKg) || null,
      activity: p.activity || 'moderate',
      targetHours: Number(p.targetHours) || (rec[0] + rec[1]) / 2
    };
  }
  function saveProfile(p) {
    try { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); } catch (e) {}
  }

  const root = document.getElementById('sleepCardRoot');
  if (!root) return;
  const cardEl  = root.querySelector('#scCard');
  const modalBg = root.querySelector('#scModalBg');
  const gearBtn = root.querySelector('#scGearBtn');
  const ageIn   = root.querySelector('#scAge');
  const sexIn   = root.querySelector('#scSex');
  const hIn     = root.querySelector('#scHeight');
  const wIn     = root.querySelector('#scWeight');
  const actIn   = root.querySelector('#scActivity');
  const tgtIn   = root.querySelector('#scTarget');

  function openModal() {
    const p = loadProfile();
    ageIn.value = p.age != null ? p.age : '';
    sexIn.value = p.sex;
    hIn.value   = p.heightCm != null ? p.heightCm : '';
    wIn.value   = p.weightKg != null ? p.weightKg : '';
    actIn.value = p.activity;
    tgtIn.value = p.targetHours;
    modalBg.classList.add('show');
  }
  function closeModal() { modalBg.classList.remove('show'); }
  gearBtn.addEventListener('click', openModal);
  root.querySelector('#scCancelBtn').addEventListener('click', closeModal);
  modalBg.addEventListener('click', (e) => { if (e.target === modalBg) closeModal(); });
  root.querySelector('#scSaveBtn').addEventListener('click', () => {
    const p = {
      age:        ageIn.value !== '' ? Number(ageIn.value) : null,
      sex:        sexIn.value,
      heightCm:   hIn.value !== ''   ? Number(hIn.value)   : null,
      weightKg:   wIn.value !== ''   ? Number(wIn.value)   : null,
      activity:   actIn.value,
      targetHours:tgtIn.value !== '' ? Number(tgtIn.value) : 8
    };
    saveProfile(p);
    closeModal();
    start();
  });

  function showMsg(text, isBad) {
    cardEl.innerHTML = '<div class="sc-msg' + (isBad ? ' bad' : '') + '">' + text + '</div>';
  }
  async function fetchSleepLogs() {
    if (!SUPABASE_URL || !SUPABASE_KEY) throw new Error('Set window.SLEEP_TRACKER.supabaseUrl and supabaseAnonKey.');
    const url = SUPABASE_URL.replace(/\/$/, '') + '/rest/v1/sleep_logs?select=*&order=date.desc&limit=30';
    const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Accept': 'application/json' } });
    if (!res.ok) { const body = await res.text().catch(() => ''); throw new Error('Supabase ' + res.status + ': ' + (body || res.statusText)); }
    return await res.json();
  }
  function fmtHrs(h) { if (h == null || isNaN(h)) return '—'; const hours = Math.floor(h); const mins = Math.round((h - hours) * 60); if (mins === 0) return hours + 'h'; return hours + 'h ' + String(mins).padStart(2, '0') + 'm'; }
  function fmtTime(iso) { const d = new Date(iso); if (isNaN(d)) return '—'; return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }); }
  function avgLast(rows, n) { if (!rows.length) return null; const slice = rows.slice(0, n); const sum = slice.reduce((s, r) => s + Number(r.duration_hours || 0), 0); return sum / slice.length; }
  function smoothPath(pts) { if (pts.length < 2) return ''; const d = ['M' + pts[0].x + ',' + pts[0].y]; for (let i = 0; i < pts.length - 1; i++) { const p0 = pts[i - 1] || pts[i]; const p1 = pts[i]; const p2 = pts[i + 1]; const p3 = pts[i + 2] || p2; const c1x = p1.x + (p2.x - p0.x) / 6; const c1y = p1.y + (p2.y - p0.y) / 6; const c2x = p2.x - (p3.x - p1.x) / 6; const c2y = p2.y - (p3.y - p1.y) / 6; d.push('C' + c1x + ',' + c1y + ' ' + c2x + ',' + c2y + ' ' + p2.x + ',' + p2.y); } return d.join(' '); }
  function stat(label, val, cls) { return '<div class="sc-stat"><div class="sc-stat-label">' + label + '</div><div class="sc-stat-val ' + (cls || '') + '">' + val + '</div></div>'; }
  function classify(hours, target) {
    if (hours == null) return '';
    if (hours < target - 1.5) return 'bad';
    if (hours < target - 0.5) return 'warn';
    return 'good';
  }
  function debtClass(d) { if (d == null) return ''; if (d > 5) return 'bad'; if (d > 2) return 'warn'; return 'good'; }
  function streakOnTarget(rows, target) {
    let n = 0;
    for (const r of rows) {
      if ((Number(r.duration_hours) || 0) >= target - 0.25) n++; else break;
    }
    return n;
  }
  function bedtimeMin(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return null;
    let m = d.getHours() * 60 + d.getMinutes() - 18 * 60;
    if (m < -12 * 60) m += 24 * 60;
    return m;
  }
  function stddev(values) {
    if (values.length < 2) return null;
    const m = values.reduce((s, v) => s + v, 0) / values.length;
    const v = values.reduce((s, x) => s + (x - m) * (x - m), 0) / values.length;
    return Math.sqrt(v);
  }
  function bmi(p) {
    if (!p.heightCm || !p.weightKg) return null;
    const m = p.heightCm / 100;
    return p.weightKg / (m * m);
  }
  function bmiClass(b) {
    if (b == null) return '';
    if (b < 18.5 || b >= 30) return 'bad';
    if (b >= 25) return 'warn';
    return 'good';
  }

  function render(rows) {
    const p = loadProfile();
    const target = Number(p.targetHours) || 8;
    rows = rows.slice().sort((a, b) => String(b.date).localeCompare(String(a.date)));
    if (!rows.length) { showMsg('No sleep yet — run the iOS Shortcut after waking up.'); return; }

    const last = rows[0];
    const lastH = Number(last.duration_hours) || 0;
    const avg7  = avgLast(rows, 7);
    const avg30 = avgLast(rows, 30);
    const debt7 = avg7 != null ? (target * Math.min(7, rows.length)) - avg7 * Math.min(7, rows.length) : null;
    const streak = streakOnTarget(rows, target);

    const bedSpread = stddev(rows.slice(0, 14).map(r => bedtimeMin(r.sleep_start)).filter(v => v != null));
    const rec = recommendedRange(p.age);
    const recTxt = rec[0] + '–' + rec[1] + 'h';
    const bmiVal = bmi(p);

    let statusCls = 'good', statusText = 'on target';
    if (lastH < target - 1.5) { statusCls = 'bad'; statusText = 'short'; }
    else if (lastH < target - 0.5) { statusCls = 'warn'; statusText = 'light'; }

    const series = rows.slice(0, 30).reverse().map(r => Number(r.duration_hours) || 0);
    const W = 600, H = 90, pad = 8;
    const minV = Math.min.apply(null, series.concat([target - 1]));
    const maxV = Math.max.apply(null, series.concat([target + 1]));
    const range = (maxV - minV) || 1;
    const pts = series.map((v, i) => ({ x: series.length === 1 ? W / 2 : (i / (series.length - 1)) * W, y: H - pad - ((v - minV) / range) * (H - pad * 2) }));
    const lineD = smoothPath(pts);
    const areaD = pts.length >= 2 ? lineD + ' L' + pts[pts.length - 1].x + ',' + H + ' L' + pts[0].x + ',' + H + ' Z' : '';
    const targetY = H - pad - ((target - minV) / range) * (H - pad * 2);

    const stats =
        stat('7-day avg',   fmtHrs(avg7),  classify(avg7, target))
      + stat('30-day avg',  fmtHrs(avg30), classify(avg30, target))
      + stat('Sleep debt',  debt7 == null ? '—' : (debt7 > 0 ? '−' : '+') + fmtHrs(Math.abs(debt7)), debtClass(debt7))
      + stat('On-target streak', streak + (streak === 1 ? ' night' : ' nights'), streak >= 3 ? 'good' : streak >= 1 ? 'warn' : 'bad')
      + stat('Bedtime spread', bedSpread == null ? '—' : '± ' + Math.round(bedSpread) + 'm', bedSpread == null ? '' : bedSpread < 30 ? 'good' : bedSpread < 60 ? 'warn' : 'bad')
      + stat('Recommended', recTxt, '')
      + (bmiVal != null ? stat('BMI', bmiVal.toFixed(1), bmiClass(bmiVal)) : '')
      + stat('Nights logged', String(rows.length), '');

    cardEl.innerHTML =
        '<div class="sc-head"><div class="sc-head-left">'
      +   '<div class="sc-head-label">Last night</div>'
      +   '<div class="sc-hours">' + fmtHrs(lastH) + '<span class="sc-hours-unit">asleep</span></div>'
      +   '<div class="sc-times">' + fmtTime(last.sleep_start) + ' bed<span class="sc-times-dot">·</span>' + fmtTime(last.wake_time) + ' wake</div>'
      + '</div><span class="sc-status-pill ' + statusCls + '">' + statusText + '</span></div>'
      + '<div class="sc-spark-wrap"><div class="sc-spark-head"><span>Last ' + rows.slice(0, 30).length + ' nights</span><span>target ' + target + 'h</span></div>'
      + '<svg class="sc-spark-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" aria-hidden="true">'
      + '<defs><linearGradient id="scSparkGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="currentColor" stop-opacity="0.45"/><stop offset="60%" stop-color="currentColor" stop-opacity="0.14"/><stop offset="100%" stop-color="currentColor" stop-opacity="0"/></linearGradient></defs>'
      + '<line x1="0" x2="' + W + '" y1="' + targetY + '" y2="' + targetY + '" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3 4"/>'
      + (areaD ? '<path d="' + areaD + '" fill="url(#scSparkGrad)"/>' : '')
      + (lineD ? '<path d="' + lineD + '" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" style="filter: drop-shadow(0 0 5px currentColor)"/>' : '')
      + '</svg></div>'
      + '<div class="sc-stats">' + stats + '</div>';
  }
  function start() {
    showMsg('Loading sleep…');
    fetchSleepLogs()
      .then(rows => render(rows || []))
      .catch(err => { console.error('[sleep-card] fetch failed', err); showMsg('Could not load sleep: ' + err.message, true); });
  }
  if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', start); }
  else { start(); }
})();
</script>
